name: E2E (nightly)
on:
  schedule:
    - cron: "0 7 * * *"  # 07:00 UTC daily
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --all-extras --dev
      - name: Run live E2E
        env:
          INVARIANCE_E2E: "1"
          INVARIANCE_API_KEY: ${{ secrets.INVARIANCE_E2E_API_KEY }}
          INVARIANCE_API_URL: ${{ secrets.INVARIANCE_E2E_API_URL || 'https://api.useinvariance.com' }}
        run: uv run pytest tests/test_integration.py -v
